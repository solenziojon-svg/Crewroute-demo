<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrewRoute</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white">
  <div class="max-w-md mx-auto min-h-screen bg-zinc-900">

    <div class="p-6">
      <h1 class="text-4xl font-bold text-center mb-8 text-emerald-400">CrewRoute</h1>

      <div class="space-y-8">
        <!-- Julian -->
        <div class="bg-zinc-800 rounded-2xl p-6">
          <img src="https://github.com/solenziojon-svg/Crewroute-demo/raw/main/julian.png" 
               class="w-full rounded-xl mb-4" alt="Julian">
          <p class="text-emerald-400 font-semibold text-center">This is Julian with CrewRoute</p>
        </div>

        <!-- Monster -->
        <div class="bg-zinc-800 rounded-2xl p-6">
          <img src="https://github.com/solenziojon-svg/Crewroute-demo/raw/main/monster.png" 
               class="w-full rounded-xl mb-4" alt="Monster">
          <p class="text-orange-400 font-semibold text-center">This is you without CrewRoute</p>
        </div>

        <button onclick="alert('Demo: This is where the real CrewRoute app would open.')"
                class="w-full bg-emerald-500 hover:bg-emerald-600 py-4 rounded-2xl text-xl font-bold">
          Build My Daily Route
        </button>
      </div>
    </div>
  </div>
</body>
</html>
