<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CrewRoute — Stop the Chaos</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{-webkit-font-smoothing:antialiased;scroll-behavior:smooth;background:#ffffff;color:#111111}

:root{
–bg:#ffffff;
–bg2:#f8f9f8;
–bg3:#f1f3f2;
–card:#ffffff;
–border:rgba(0,0,0,0.08);
–border-g:rgba(16,229,154,0.22);
–green:#10E59A;
–green-dk:#0AAD74;
–green-lt:rgba(16,229,154,0.10);
–gold:#C9A84C;
–gold-lt:rgba(201,168,76,0.12);
–muted:#333333;
–red-lt:rgba(214,69,69,0.10);
–red-bd:rgba(214,69,69,0.22);
}

body{
font-family:‘DM Sans’,system-ui,sans-serif;
background:var(–bg);
overflow-x:hidden;
line-height:1.6;
}

/* ── BACKGROUND ────────────────────────────── */
body::before{
content:’’;
position:fixed;inset:0;z-index:0;pointer-events:none;
background:
radial-gradient(ellipse 80vw 55vh at 50% -5%, rgba(16,229,154,0.06) 0%, transparent 65%),
radial-gradient(ellipse 50vw 40vh at 95% 75%, rgba(16,100,60,0.04) 0%, transparent 55%),
radial-gradient(ellipse 40vw 45vh at 5%  50%, rgba(201,168,76,0.03) 0%, transparent 55%);
}
body::after{
content:’’;
position:fixed;inset:0;z-index:0;pointer-events:none;
background-image:
linear-gradient(rgba(0,0,0,0.018) 1px,transparent 1px),
linear-gradient(90deg,rgba(0,0,0,0.018) 1px,transparent 1px);
background-size:64px 64px;
-webkit-mask-image:radial-gradient(ellipse 85% 85% at 50% 50%, black 30%, transparent 100%);
mask-image:radial-gradient(ellipse 85% 85% at 50% 50%, black 30%, transparent 100%);
}

/* ── CONTENT LAYER ─────────────────────────── */
.page{position:relative;z-index:1}

/* ── REVEAL ────────────────────────────────── */
.r{opacity:0;transform:translateY(24px);transition:opacity .7s cubic-bezier(.16,1,.3,1),transform .7s cubic-bezier(.16,1,.3,1)}
.r.on{opacity:1;transform:none}
.d1{transition-delay:.10s}.d2{transition-delay:.22s}.d3{transition-delay:.34s}.d4{transition-delay:.46s}

/* ── NAV ───────────────────────────────────── */
.nav{
position:sticky;top:0;z-index:200;
padding:10px 20px;
display:flex;align-items:center;justify-content:space-between;
background:rgba(255,255,255,0.95);
-webkit-backdrop-filter:blur(20px);
backdrop-filter:blur(20px);
border-bottom:1px solid var(–border);
}
.nav-logo img{height:52px;width:auto;display:block}
.nav-btn{
display:inline-flex;align-items:center;gap:7px;
background:#10E59A;color:#000000;
font-family:‘DM Sans’,sans-serif;
font-size:.75rem;font-weight:700;
letter-spacing:.05em;
padding:11px 20px;border-radius:100px;
border:none;cursor:pointer;
-webkit-tap-highlight-color:transparent;
box-shadow:0 0 20px rgba(16,229,154,0.35);
transition:all .2s;
}
.nav-btn:active{opacity:.85;transform:scale(.97)}

/* ── HERO ──────────────────────────────────── */
.hero{
padding:52px 24px 0;
text-align:center;
position:relative;
}
.hero-orb{
position:absolute;top:10%;left:50%;
transform:translateX(-50%);
width:300px;height:300px;border-radius:50%;
background:radial-gradient(circle,rgba(16,229,154,0.08) 0%,transparent 70%);
pointer-events:none;
animation:breathe 4s ease-in-out infinite;
}
@keyframes breathe{
0%,100%{transform:translateX(-50%) scale(1);opacity:.7}
50%{transform:translateX(-50%) scale(1.2);opacity:1}
}

/* Badge */
.badge{
display:inline-flex;align-items:center;gap:8px;
background:rgba(16,229,154,0.08);
border:1px solid rgba(16,229,154,0.28);
border-radius:100px;padding:7px 16px;
font-size:.6rem;font-weight:700;
letter-spacing:.22em;text-transform:uppercase;
color:#10E59A;margin-bottom:28px;
}
.badge-dot{
width:5px;height:5px;border-radius:50%;
background:#10E59A;
animation:dot-pulse 2s ease-in-out infinite;
}
@keyframes dot-pulse{
0%,100%{box-shadow:0 0 0 0 rgba(16,229,154,.7)}
50%{box-shadow:0 0 0 5px rgba(16,229,154,0)}
}

/* Hero headline — FIXED: no webkit-text-stroke, solid colors */
.hero-h1{
font-family:‘Cormorant’,Georgia,serif;
font-size:clamp(60px,17vw,100px);
line-height:.86;font-weight:500;
letter-spacing:-.04em;
color:#111111;
margin-bottom:4px;
}
.hero-h1 .green{color:#10E59A}
.hero-h1 .gold{color:#C9A84C}

.hero-sub{
font-size:.9375rem;font-weight:300;
color:var(–muted);line-height:1.65;
max-width:340px;margin:16px auto 40px;
}

/* Chaos image */
.chaos-wrap{
display:flex;justify-content:center;
position:relative;margin-bottom:4px;
}
.chaos-ring{
position:relative;
width:240px;height:240px;
}
.chaos-ring::before{
content:’’;position:absolute;inset:-6px;
border-radius:50%;
background:conic-gradient(#10E59A, #0AAD74, #10E59A, rgba(16,229,154,0.1), #10E59A);
animation:spin 6s linear infinite;
}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.chaos-img{
position:absolute;inset:4px;
border-radius:50%;
object-fit:cover;
width:calc(100% - 8px);
height:calc(100% - 8px);
box-shadow:0 0 50px rgba(16,229,154,0.15),0 24px 60px rgba(0,0,0,0.6);
animation:float 4s ease-in-out infinite;
}
@keyframes float{
0%,100%{transform:translateY(0) rotate(-1deg)}
50%{transform:translateY(-12px) rotate(1deg)}
}
.chaos-tag{
position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);
background:var(–bg);
border:1.5px solid var(–gold);
border-radius:100px;padding:5px 20px;
font-size:.6rem;font-weight:800;
letter-spacing:.20em;text-transform:uppercase;
color:var(–gold);white-space:nowrap;
box-shadow:0 0 18px rgba(201,168,76,0.22);
}

/* Chaos card */
.chaos-card{
background:var(–card);
border:1px solid var(–border);
border-radius:22px;padding:28px 24px;
margin:48px 24px 0;
position:relative;overflow:hidden;
}
.chaos-card::before{
content:’’;position:absolute;top:0;left:0;right:0;height:1px;
background:linear-gradient(90deg,transparent,var(–gold) 50%,transparent);
}
.chaos-card-label{
font-size:.6rem;font-weight:800;letter-spacing:.22em;
text-transform:uppercase;color:var(–gold);margin-bottom:10px;
}
.chaos-card h3{
font-family:‘Cormorant’,Georgia,serif;
font-size:clamp(22px,6vw,32px);font-weight:500;
color:#111111;line-height:1;margin-bottom:10px;
}
.chaos-card p{
font-size:.875rem;font-weight:300;color:var(–muted);line-height:1.65;
}

/* Metrics */
.metrics{
background:var(–bg2);
border-top:1px solid var(–border);
border-bottom:1px solid var(–border);
padding:28px 24px;margin-top:40px;
display:grid;grid-template-columns:repeat(3,1fr);gap:0;
}
.met{text-align:center;padding:0 6px;border-right:1px solid var(–border)}
.met:last-child{border:none}
.met-val{
font-family:‘Cormorant’,Georgia,serif;
font-size:clamp(26px,7vw,40px);font-weight:500;
color:#111111;line-height:1;margin-bottom:5px;
}
.met-val.g{color:#10E59A}
.met-lbl{font-size:.55rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(–muted)}

/* Section helpers */
.sec{padding:48px 24px}
.sec-label{font-size:.6rem;font-weight:800;letter-spacing:.24em;text-transform:uppercase;color:#10E59A;margin-bottom:14px}
.sec-h{
font-family:‘Cormorant’,Georgia,serif;
font-size:clamp(32px,8vw,48px);font-weight:500;
line-height:.92;letter-spacing:-.025em;color:#111111;margin-bottom:14px;
}
.sec-h em{color:#10E59A;font-style:italic}
.sec-p{font-size:.9375rem;font-weight:300;color:var(–muted);line-height:1.65;margin-bottom:28px}

/* Before / After */
.ba-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ba-card{border-radius:16px;padding:18px}
.ba-before{background:rgba(214,69,69,0.08);border:1px solid rgba(214,69,69,0.22)}
.ba-after{background:rgba(16,229,154,0.08);border:1px solid rgba(16,229,154,0.22)}
.ba-label{font-size:.55rem;font-weight:800;letter-spacing:.18em;text-transform:uppercase;margin-bottom:12px}
.ba-before .ba-label{color:#D64545}
.ba-after  .ba-label{color:#10E59A}
.ba-item{display:flex;align-items:flex-start;gap:7px;font-size:.8125rem;line-height:1.4;margin-bottom:9px;color:#111111}
.ba-item:last-child{margin-bottom:0}
.ba-item span{flex-shrink:0}

/* Feature cards */
.feat-stack{display:flex;flex-direction:column;gap:10px}
.feat-card{
background:var(–card);border:1px solid var(–border);
border-radius:18px;padding:20px;
display:flex;align-items:flex-start;gap:14px;
position:relative;overflow:hidden;
-webkit-tap-highlight-color:transparent;
transition:border-color .2s;
}
.feat-card::after{
content:’’;position:absolute;left:0;top:0;bottom:0;
width:2px;background:#10E59A;
transform:scaleY(0);transform-origin:bottom;
transition:transform .3s cubic-bezier(.16,1,.3,1);
}
.feat-card:hover::after,.feat-card:active::after{transform:scaleY(1)}
.feat-card:hover{border-color:var(–border-g)}
.feat-icon{
width:36px;height:36px;border-radius:10px;
background:rgba(16,229,154,0.10);
border:1px solid rgba(16,229,154,0.22);
display:flex;align-items:center;justify-content:center;
font-size:17px;flex-shrink:0;
}
.feat-title{font-size:.9375rem;font-weight:600;color:#111111;margin-bottom:4px}
.feat-body{font-size:.8125rem;font-weight:300;color:var(–muted);line-height:1.55}

/* Receipt */
.receipt{
background:var(–bg2);border:1px solid var(–border);
border-radius:20px;padding:24px;
font-family:‘DM Mono’,monospace;
position:relative;overflow:hidden;
}
.receipt::before{
content:’’;position:absolute;top:0;left:0;right:0;height:1px;
background:linear-gradient(90deg,transparent,#10E59A 50%,transparent);
}
.rec-hd{
font-size:.55rem;font-weight:600;letter-spacing:.18em;
text-transform:uppercase;color:#10E59A;
margin-bottom:16px;text-align:center;
}
.rec-row{
display:flex;justify-content:space-between;align-items:center;
padding:9px 0;border-bottom:1px solid rgba(0,0,0,0.05);
font-size:.8125rem;
}
.rec-row:last-of-type{border:none}
.rec-label{color:var(–muted)}
.rec-before{color:rgba(0,0,0,0.25);text-decoration:line-through;font-size:.75rem}
.rec-after{color:#10E59A;font-weight:600}
.rec-total{
margin-top:16px;padding:16px;
background:rgba(16,229,154,0.08);
border:1px solid rgba(16,229,154,0.22);
border-radius:12px;text-align:center;
}
.rec-total-num{
font-family:‘Cormorant’,Georgia,serif;
font-size:58px;font-weight:500;color:#10E59A;line-height:1;
}
.rec-total-lbl{font-size:.6rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(–muted);margin-top:4px}

/* Testimonial */
.testi{
background:var(–card);border:1px solid var(–border);
border-radius:22px;padding:28px;
position:relative;overflow:hidden;
}
.testi::before{
content:’”’;position:absolute;top:12px;right:16px;
font-size:72px;color:rgba(0,0,0,0.04);
font-family:Georgia,serif;line-height:1;
}
.testi-stars{color:var(–gold);font-size:.875rem;letter-spacing:2px;margin-bottom:14px}
.testi-q{
font-family:‘Cormorant’,Georgia,serif;
font-size:1.25rem;font-weight:400;color:#111111;
line-height:1.4;margin-bottom:18px;
}
.testi-auth{display:flex;align-items:center;gap:12px}
.testi-av{
width:36px;height:36px;border-radius:50%;
background:#10E59A;display:flex;align-items:center;
justify-content:center;font-size:.875rem;font-weight:700;
color:#000;flex-shrink:0;
}
.testi-name{font-size:.875rem;font-weight:600;color:#111111}
.testi-co{font-size:.75rem;color:var(–muted)}

/* CTA */
.cta{
padding:52px 24px 60px;text-align:center;
border-top:1px solid var(–border);
background:linear-gradient(180deg,var(–bg) 0%,var(–bg2) 100%);
}
.cta-pre{font-size:.6rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(–muted);margin-bottom:18px}
.cta-h{
font-family:‘Cormorant’,Georgia,serif;
font-size:clamp(42px,11vw,62px);font-weight:500;
line-height:.90;color:#111111;margin-bottom:10px;
}
.cta-h em{color:#10E59A;font-style:italic}
.cta-sub{font-size:.9rem;font-weight:300;color:var(–muted);margin-bottom:28px;line-height:1.6}

.price-pill{
display:inline-flex;align-items:baseline;gap:4px;
background:rgba(201,168,76,0.10);
border:1px solid rgba(201,168,76,0.28);
border-radius:12px;padding:10px 22px;margin-bottom:28px;
}
.price-amt{
font-family:‘Cormorant’,Georgia,serif;
font-size:44px;font-weight:500;color:#111111;line-height:1;
}
.price-per{font-size:.875rem;font-weight:300;color:var(–muted)}

.btn-main{
display:flex;align-items:center;justify-content:center;gap:10px;
width:100%;background:#10E59A;color:#000000;
font-family:‘DM Sans’,sans-serif;
font-size:1rem;font-weight:700;letter-spacing:.02em;
padding:20px 24px;border-radius:16px;
border:none;cursor:pointer;
-webkit-tap-highlight-color:transparent;
box-shadow:0 0 0 0 rgba(16,229,154,0);
transition:all .2s;
position:relative;overflow:hidden;
}
.btn-main::before{
content:’’;position:absolute;inset:0;
background:linear-gradient(135deg,rgba(255,255,255,0.14),transparent);
}
.btn-main:active{transform:scale(.98);opacity:.9}

.btn-ghost{
display:flex;align-items:center;justify-content:center;gap:8px;
width:100%;background:transparent;
color:rgba(0,0,0,0.50);
font-family:‘DM Sans’,sans-serif;font-size:.875rem;font-weight:500;
padding:14px;border-radius:12px;
border:1px solid var(–border);cursor:pointer;
margin-top:10px;
-webkit-tap-highlight-color:transparent;
transition:all .2s;
}
.btn-ghost:active{color:#111111;border-color:rgba(0,0,0,0.2)}

.trust-row{
display:flex;justify-content:center;gap:18px;
margin-top:18px;flex-wrap:wrap;
}
.trust-item{
display:flex;align-items:center;gap:5px;
font-size:.7rem;font-weight:500;color:var(–muted);
}
.trust-dot{width:4px;height:4px;border-radius:50%;background:#10E59A}

/* Footer */
.footer{
padding:24px;border-top:1px solid var(–border);
display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center;
}
.footer img{height:36px;width:auto;opacity:.55}
.footer-copy{font-size:.7rem;color:rgba(0,0,0,0.35)}
.footer-links{display:flex;gap:16px}
.footer-links a{font-size:.7rem;color:rgba(0,0,0,0.45);text-decoration:none;transition:color .2s}
.footer-links a:active{color:var(–muted)}

/* Scrollbar */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(–bg)}
::-webkit-scrollbar-thumb{background:var(–green-dk);border-radius:3px}
</style>

</head>
